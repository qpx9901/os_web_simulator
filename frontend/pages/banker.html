<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>银行家算法模拟器</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        .container {
            width: 90%;
            margin: auto;
            padding-top: 30px;
        }

        h1 {
            text-align: center;
            font-size: 34px;
            margin-bottom: 20px;
        }

        .panel {
            background: rgba(255,255,255,0.08);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        button {
            padding: 10px 18px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #00c6ff;
            color: white;
            font-weight: bold;
        }

        button:hover {
            background: #0072ff;
        }

        textarea, input {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            color: white;
        }

        th, td {
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding: 8px;
            text-align: center;
        }

        th {
            background: rgba(255,255,255,0.1);
        }

        .safe {
            color: #00ff99;
            font-weight: bold;
        }

        .unsafe {
            color: #ff5252;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>银行家算法模拟器</h1>

    <!-- 输入区 -->
    <div class="panel">

        <h3>资源分配矩阵 Allocation</h3>
        <textarea id="allocation">[[0,1,0],[2,0,0],[3,0,2]]</textarea>

        <h3>最大需求矩阵 Max</h3>
        <textarea id="maxNeed">[[7,5,3],[3,2,2],[9,0,2]]</textarea>

        <h3>可用资源 Available</h3>
        <input id="available" value="[3,3,2]">

        <button onclick="runBanker()">检测安全性</button>

    </div>

    <!-- 结果区 -->
    <div class="panel">

        <h3>运行结果</h3>

        <div id="status"></div>

        <table id="resultTable">
            <tr>
                <th>安全序列</th>
            </tr>
        </table>

    </div>

</div>

<script src="../js/banker.js"></script>

</body>

</html>
