<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>磁盘调度模拟器</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        .container {
            width: 90%;
            margin: auto;
            padding-top: 30px;
        }

        h1 {
            text-align: center;
        }

        .panel {
            background: rgba(255,255,255,0.08);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        input, select {
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            background: #00c6ff;
            color: white;
        }

        button:hover {
            background: #0072ff;
        }

        #track {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .block {
            width: 60px;
            height: 40px;
            background: #00c6ff;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }

        .total {
            font-size: 20px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>磁盘调度算法模拟器</h1>

    <div class="panel">

        <input id="requests" value="98,183,37,122,14,124,65,67">
        <input id="head" value="53">

        <select id="algo">
            <option value="sstf">SSTF</option>
            <option value="scan">SCAN</option>
            <option value="cscan">C-SCAN</option>
        </select>

        <button onclick="run()">开始模拟</button>

    </div>

    <div class="panel">
        <div id="track"></div>
    </div>

    <div class="panel">
        <div class="total" id="total"></div>
    </div>

</div>

<script src="../js/disk_schedule.js"></script>

</body>

</html>
