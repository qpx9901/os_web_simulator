<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>CPU调度模拟器</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        .container {
            width: 90%;
            margin: auto;
            padding-top: 30px;
        }

        h1 {
            text-align: center;
            font-size: 34px;
            margin-bottom: 20px;
        }

        .panel {
            background: rgba(255,255,255,0.08);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        select, input {
            padding: 8px;
            margin: 5px;
            border-radius: 6px;
            border: none;
            outline: none;
        }

        button {
            padding: 10px 18px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #00c6ff;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #0072ff;
            transform: scale(1.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            color: white;
        }

        th, td {
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding: 8px;
            text-align: center;
        }

        th {
            background: rgba(255,255,255,0.1);
        }

        #gantt {
            display: flex;
            height: 60px;
            margin-top: 10px;
            border-radius: 10px;
            overflow: hidden;
        }

        .block {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            border-right: 2px solid rgba(255,255,255,0.2);
        }

        .title {
            font-size: 18px;
            margin-bottom: 10px;
            opacity: 0.9;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>CPU调度算法模拟器</h1>

    <!-- 控制面板 -->
    <div class="panel">

        <div class="title">调度控制</div>

        <label>算法：</label>
        <select id="algo">
            <option value="fcfs">FCFS</option>
            <option value="rr">RR</option>
            <option value="sjf">SJF</option>
            <option value="hrn">HRN</option>
        </select>

        <input id="timeSlice" placeholder="时间片(RR)" value="2">

        <button onclick="addProcess()">添加进程</button>
        <button onclick="run()">运行调度</button>

    </div>

    <!-- 输入区 -->
    <div class="panel">

        <div class="title">进程输入</div>

        <table id="processTable">
            <tr>
                <th>PID</th>
                <th>到达时间</th>
                <th>服务时间</th>
            </tr>

            <tr>
                <td><input value="P1"></td>
                <td><input value="0"></td>
                <td><input value="3"></td>
            </tr>

            <tr>
                <td><input value="P2"></td>
                <td><input value="1"></td>
                <td><input value="4"></td>
            </tr>
        </table>

    </div>

    <!-- 结果区 -->
    <div class="panel">

        <div class="title">调度结果</div>

        <table id="resultTable">
            <tr>
                <th>PID</th>
                <th>完成时间</th>
                <th>周转时间</th>
                <th>带权周转时间</th>
            </tr>
        </table>

    </div>

    <!-- 甘特图区 -->
    <div class="panel">

        <div class="title">甘特图</div>

        <div id="gantt"></div>

    </div>

</div>

<script src="../js/scheduler.js"></script>

</body>

</html>
